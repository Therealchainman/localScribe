<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Transcriber{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'transcriber/css/styles.css' %}">
    <link rel="manifest" href="{% static 'transcriber/manifest.json' %}">
    <meta name="theme-color" content="#4a6cf7">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{% url 'transcriber:record' %}">Local Scribe</a></h1>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
